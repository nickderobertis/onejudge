# The live tier: drive a REAL oneharness + harness so the OneharnessProvider path
# is proven against the genuine external service. Deliberately OUT of the `check`
# gate (non-deterministic, credentialed, networked). It REQUIRES its credential
# and fails fast without it — it never no-ops to a green pass. Fork PRs are gated
# by the repo's require-approval-for-fork-workflows setting (see references/ci.md),
# not by a no-op branch here. Not in the required-checks set. See docs/live-tier.md.

name: live

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: extractions/setup-just@v3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: astral-sh/setup-uv@v6   # setup-llmlint.sh installs oneharness via `uv tool`
      - name: Install oneharness + an authenticated harness (Claude Code)
        run: |
          npm install -g @anthropic-ai/claude-code   # the harness binary oneharness shells out to (`claude`)
          ./scripts/setup-llmlint.sh                 # installs oneharness (and llmlint) via uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # GITHUB_PATH is available only to later steps, so assert via the
          # explicit path here and print the installed version for diagnosis.
          test -x "$HOME/.local/bin/oneharness"
          "$HOME/.local/bin/oneharness" --version
      - name: Run the live tier
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ONEJUDGE_LIVE_HARNESS: claude-code
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::the live tier needs a real harness credential (CLAUDE_CODE_OAUTH_TOKEN)." \
                 "Add the repo secret; fork PRs are gated by require-approval-for-fork-workflows." >&2
            exit 1
          fi
          just test-live
